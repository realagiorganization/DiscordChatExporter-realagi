name: chat-exporter-tests

on:
  workflow_dispatch:
    inputs:
      maxCpuCount:
        description: "Max parallel test workers (1 to reduce rate limits)"
        required: false
        default: "1"
      disableParallelization:
        description: "Disable xUnit parallelization (recommended)"
        required: false
        default: "true"

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Run tests (sequential by default)
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          dotnet test \
            -p:CSharpier_Bypass=true \
            --configuration Release \
            --logger "GitHubActions;summary.includePassedTests=true;summary.includeSkippedTests=true" \
            -- \
            RunConfiguration.DisableParallelization=${{ github.event.inputs.disableParallelization }} \
            RunConfiguration.MaxCpuCount=${{ github.event.inputs.maxCpuCount }}
